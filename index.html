<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Swaroop's Dictionary</title>
  <meta name="description"
    content="Vocabify is a vocabulary learning platform with daily word discovery, streak tracking, pronunciation support, and behavioral analytics." />

    content="dictionary app, vocabulary builder, word of the day, english learning, pronunciation, synonyms, antonyms" />
  <meta name="author" content="Swaroop" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://your-domain.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Swaroop's Dictionary" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.com/" />

  <!-- Preconnect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Structured Data -->

    "@context": "https://schema.org",

    "name": "Swaroop's Dictionary",
    "url": "https://your-domain.com/",
    "description": "A vocabulary learning platform with daily word discovery, streak tracking, pronunciation, and analytics.",
